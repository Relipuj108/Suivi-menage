<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Planning ménage</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Organisation maison</p>
        <h1>Planning ménage</h1>
        <p class="subtitle">Limelette </p>
      </div>
      <button id="refreshBtn" class="icon-btn" type="button" aria-label="Rafraîchir">↻</button>
    </header>

    <nav class="person-switch">
      <button class="person-tab neutral active" data-person="all">Tous</button>
      <button class="person-tab" data-person="Mathieu">Mathieu</button>
      <button class="person-tab" data-person="Sarah">Sarah</button>
    </nav>

    <section class="panel form-panel">
      <div class="section-title-row">
        <h2>Nouvelle tâche</h2>
      </div>

      <form id="taskForm" class="task-form">
        <div class="field">
          <label for="title">Tâche</label>
          <input id="title" name="title" type="text" maxlength="120" placeholder="Ex : Passer l’aspirateur en haut" required />
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="assignee">Assigné à</label>
            <select id="assignee" name="assignee" required>
              <option value="Mathieu">Mathieu</option>
              <option value="Sarah">Sarah</option>
            </select>
          </div>

          <div class="field">
            <label for="dueDate">Date prévue</label>
            <input id="dueDate" name="dueDate" type="date" required />
          </div>
        </div>

        <div class="field">
          <label for="repeatDays">Répétition (jours)</label>

          <div class="repeat-picker">
            <div class="repeat-quick" id="repeatQuickButtons">
              <button type="button" class="repeat-mini-btn" data-repeat="1">1</button>
              <button type="button" class="repeat-mini-btn" data-repeat="2">2</button>
              <button type="button" class="repeat-mini-btn" data-repeat="3">3</button>
              <button type="button" class="repeat-mini-btn" data-repeat="4">4</button>
              <button type="button" class="repeat-mini-btn" data-repeat="5">5</button>
              <button type="button" class="repeat-mini-btn" data-repeat="6">6</button>
              <button type="button" class="repeat-mini-btn" data-repeat="7">7</button>
              <button type="button" class="repeat-mini-btn" data-repeat="8">8</button>
              <button type="button" class="repeat-mini-btn" data-repeat="9">9</button>
              <button type="button" class="repeat-mini-btn" data-repeat="10">10</button>
            </div>

            <input id="repeatDays" name="repeatDays" type="number" min="0" step="1" value="0" />
          </div>
        </div>

        <div class="field">
          <label for="notes">Note</label>
          <input id="notes" name="notes" type="text" maxlength="200" placeholder="Optionnel" />
        </div>

        <button class="primary-btn full-btn" type="submit">Ajouter la tâche</button>
      </form>
    </section>

    <section class="panel controls-panel">
      <div class="section-title-row">
        <h2>Vue</h2>
      </div>

      <div class="view-toggle">
        <button class="view-btn active" data-view="day">Jour</button>
        <button class="view-btn" data-view="week">Semaine</button>
        <button class="view-btn" data-view="nextWeek">Semaine prochaine</button>
      </div>

      <div class="filters-grid">
        <div class="field">
          <label for="selectedDate">Jour sélectionné</label>
          <input id="selectedDate" type="date" />
        </div>

        <div class="field">
          <label for="statusFilter">Statut</label>
          <select id="statusFilter">
            <option value="pending">À faire</option>
            <option value="all">Toutes</option>
            <option value="done">Terminées</option>
            <option value="inactive">Inactives</option>
          </select>
        </div>
      </div>
    </section>

    <section class="panel agenda-panel">
      <div class="section-title-row">
        <div>
          <h2 id="agendaTitle">Agenda</h2>
          <p id="agendaSubtitle" class="section-subtitle"></p>
        </div>
        <span id="countBadge" class="count-badge">0</span>
      </div>

      <div id="statusMessage" class="status-message"></div>
      <div id="agendaContainer" class="agenda-container"></div>
    </section>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>Modifier la tâche</h3>
        <button id="closeModalBtn" class="close-btn" type="button">✕</button>
      </div>

      <form id="editForm" class="edit-form">
        <input id="editId" type="hidden" />

        <div class="field">
          <label for="editTitle">Titre</label>
          <input id="editTitle" type="text" maxlength="120" required />
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="editAssignee">Assigné à</label>
            <select id="editAssignee" required>
              <option value="Mathieu">Mathieu</option>
              <option value="Sarah">Sarah</option>
            </select>
          </div>

          <div class="field">
            <label for="editDueDate">Prochaine occurrence</label>
            <input id="editDueDate" type="date" required />
          </div>
        </div>

        <div class="field">
          <label for="editRepeatDays">Répétition (jours)</label>

          <div class="repeat-picker">
            <div class="repeat-quick" id="editRepeatQuickButtons">
              <button type="button" class="repeat-mini-btn" data-repeat="1">1</button>
              <button type="button" class="repeat-mini-btn" data-repeat="2">2</button>
              <button type="button" class="repeat-mini-btn" data-repeat="3">3</button>
              <button type="button" class="repeat-mini-btn" data-repeat="4">4</button>
              <button type="button" class="repeat-mini-btn" data-repeat="5">5</button>
              <button type="button" class="repeat-mini-btn" data-repeat="6">6</button>
              <button type="button" class="repeat-mini-btn" data-repeat="7">7</button>
              <button type="button" class="repeat-mini-btn" data-repeat="8">8</button>
              <button type="button" class="repeat-mini-btn" data-repeat="9">9</button>
              <button type="button" class="repeat-mini-btn" data-repeat="10">10</button>
            </div>

            <input id="editRepeatDays" type="number" min="0" step="1" required />
          </div>
        </div>

        <div class="field">
          <label for="editNotes">Note</label>
          <input id="editNotes" type="text" maxlength="200" />
        </div>

        <div class="modal-actions">
          <button class="primary-btn" type="submit">Enregistrer</button>
          <button id="inactiveFromModalBtn" class="secondary-btn" type="button">Mettre inactive</button>
        </div>
      </form>
    </div>
  </div>

  <div id="completeModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card futuristic-card">
      <div class="modal-header">
        <h3>Valider la tâche</h3>
        <button id="closeCompleteModalBtn" class="close-btn" type="button">✕</button>
      </div>

      <div class="complete-modal-body">
        <p id="completeModalText" class="complete-text"></p>

        <div class="complete-options">
          <button id="completeFromDueBtn" class="option-btn" type="button">
            Depuis la date prévue
          </button>

          <button id="completeFromTodayBtn" class="option-btn" type="button">
            Depuis aujourd’hui
          </button>
        </div>

        <div class="manual-next-block">
          <label for="manualNextDate">Prochaine occurrence</label>
          <input id="manualNextDate" type="date" />
          <button id="completeManualBtn" class="primary-btn full-btn" type="button">
            Valider avec cette date
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
